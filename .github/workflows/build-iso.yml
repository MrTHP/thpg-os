name: Build ISO

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: sudo apt-get install -y podman

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Pull image
        run: sudo podman pull ghcr.io/mrthp/thpg-os:latest

      - name: Extract GPG key from image
        run: |
          # Monter l'image directement (pas besoin de conteneur)
          MOUNTPOINT=$(sudo podman image mount ghcr.io/mrthp/thpg-os:latest)
          sudo cp "$MOUNTPOINT/etc/pki/rpm-gpg/RPM-GPG-KEY-terra43-mesa" \
            ./RPM-GPG-KEY-terra43-mesa
          sudo podman image unmount ghcr.io/mrthp/thpg-os:latest

      - name: Create output directory
        run: mkdir -p output

      - name: Build ISO
        run: |
          sudo podman run \
            --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v $(pwd)/output:/output \
            -v $(pwd)/RPM-GPG-KEY-terra43-mesa:/etc/pki/rpm-gpg/RPM-GPG-KEY-terra43-mesa:ro \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build --output /output \
            --type anaconda-iso \
            --rootfs xfs \
            ghcr.io/mrthp/thpg-os:latest

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v7
        with:
          name: thpg-os-install-iso
          path: output/bootiso/
          if-no-files-found: error

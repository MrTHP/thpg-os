name: Build ISO

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: sudo apt-get install -y podman

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Pull image
        run: sudo podman pull ghcr.io/mrthp/thpg-os:latest

      - name: Fix terra-mesa GPG
        run: |
          CONTAINER=$(sudo podman create ghcr.io/mrthp/thpg-os:latest)
          sudo podman start $CONTAINER
          sudo podman exec $CONTAINER \
            sed -i 's/^enabled=1/enabled=0/' /etc/yum.repos.d/terra.repo
          sudo podman commit $CONTAINER ghcr.io/mrthp/thpg-os:iso-build
          sudo podman rm -f $CONTAINER

      - name: Create output directory
        run: mkdir -p output

      - name: Build ISO
        run: |
          sudo podman run \
            --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build --output /output \
            --type anaconda-iso \
            --rootfs xfs \
            ghcr.io/mrthp/thpg-os:iso-build

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: thpg-os-install-iso
          path: output/bootiso/
          if-no-files-found: error
